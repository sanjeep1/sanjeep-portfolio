name: Deploy to Production (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # Node setup with caching
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: package-lock.json

      # -------------------------
      # Install dependencies (cached)
      # -------------------------
      - name: Install dependencies
        run: npm ci

      # -------------------------
      # Build Tailwind CSS
      # -------------------------
      - name: Build assets
        run: npm run build

      # -------------------------
      # FTP Deploy
      # -------------------------
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          server-dir: /htdocs/wp-content/themes/sanjeep-portfolio-theme/
          
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/src/**
            tailwind.config.js
            postcss.config.js
